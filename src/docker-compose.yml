##############################################################################
# EvilAgent – docker-compose
#
# Update:  docker compose build --pull && docker compose up -d
#          (data in volumes is preserved)
# Config:  .env – see .env.example. Agents are kept alive by AgentsMonitor via
#          cron inside the container, not configured here (see README).
##############################################################################
services:
  evilagent:
    build:
      context: .
    image: evilagent:latest
    container_name: "${CONTAINER_NAME:-evilagent}"
    hostname: "${CONTAINER_NAME:-evilagent}"
    restart: unless-stopped
    init: false                       # PID 1 is handled by tini inside the image
    stop_grace_period: 30s

    # Configuration (and any keys you choose to add) is passed via .env – NEVER
    # baked into the image. Tool credentials come from interactive login and
    # live in the volumes below.
    env_file:
      - .env

    # -------------------------------- SECURITY --------------------------------
    # This configuration contains HOST DAMAGE. It does not contain DATA:
    # outbound network access is unrestricted by default and all agents share
    # one home directory. See README.md.
    security_opt:
      - no-new-privileges:true        # prevents privilege escalation (blocks setuid/sudo)
    cap_drop:
      - ALL                           # drop all Linux capabilities ...
    cap_add:                          # ... and restore only the minimum needed by entrypoint
      # These are held ONLY by the root-run entrypoint, which immediately drops
      # to the unprivileged 'agent' user. Agents themselves are uid 1000 and
      # hold no capabilities, so this does not loosen their confinement.
      - CHOWN                         # take ownership of freshly created volumes
      - DAC_OVERRIDE                  # traverse/write /home/agent (mode 0750, owned by agent)
      - FOWNER                        # chmod 700 ~/.ssh, which root does not own
      - SETUID                        # runuser: drop from root to agent
      - SETGID
    pids_limit: 4096                  # guard against a fork-bombing agent
    mem_limit: "${MEM_LIMIT:-6g}"
    memswap_limit: "${MEM_LIMIT:-6g}" # equal to mem_limit = swap disabled
    cpus: "${CPUS:-4}"
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
    tmpfs:
      - /tmp:size=1g,mode=1777
    # INTENTIONALLY ABSENT:
    #   - /var/run/docker.sock mount  (agent would control all of Docker = sandbox escape)
    #   - network_mode: host          (agent would see the host network)
    #   - privileged: true            (never)
    #   - bind-mounts of sensitive host paths

    ports:
      - "${AGENTSMON_PORT:-8765}:8765"

    networks:
      - agentnet

    # -------------------------- PERSISTENT DATA (volumes) --------------------
    # Survive restart and image rebuild. Tool binaries are in the image; only
    # config, credentials, and agent working data live here.
    volumes:
      - codex:/home/agent/.codex
      - claude:/home/agent/.claude
      - config:/home/agent/.config
      - cache:/home/agent/.cache
      - localstate:/home/agent/.local/state
      - hermes:/home/agent/.hermes
      - openclaw:/home/agent/.openclaw
      - agent2telegram:/home/agent/.agent2telegram
      - agentsmon:/home/agent/.agentsmon
      - ssh:/home/agent/.ssh
      - workspace:/home/agent/workspace
      - crontabs:/var/spool/cron/crontabs

    healthcheck:
      # Verifies keepalive, the tmux session, and cron - the machinery that
      # keeps agents alive. Individual agents are AgentsMonitor's job
      # (`make agents`); it relaunches them within a minute.
      test: ["CMD", "/usr/local/bin/container-health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  agentnet:
    driver: bridge
    # Optional: internal network with no outbound access to other containers.
    # internal: true  # WARNING: agents will then have no internet/API access.

volumes:
  codex:
  claude:
  config:
  cache:
  localstate:
  hermes:
  openclaw:
  agent2telegram:
  agentsmon:
  ssh:
  workspace:
  crontabs:
