name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    name: Lint shell, Dockerfile and compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The repo is essentially all shell + Dockerfile, so static analysis is
      # most of the test suite we can have without a live Docker daemon.
      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./src/scripts
          severity: warning

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: src/Dockerfile
          # DL3008/DL3013: apt/pip version pinning - deliberately unpinned;
          #   tools install at @latest.
          # SC2016: the profile.d heredoc writes literal $PATH on purpose.
          ignore: DL3008,DL3013,SC2016

      - name: Validate docker-compose
        working-directory: ./src
        run: |
          cp .env.example .env
          docker compose config -q
          echo "compose config OK"

  build:
    name: Build image (core tools only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build with only the tools whose installers are reliable. The webinar
      # URLs for the third-party tools are frequently unavailable and would make
      # CI red for reasons unrelated to this repo. Codex and Claude Code are
      # required by install-tools.sh, so this build fails if they break.
      - name: Build
        working-directory: ./src
        run: |
          cp .env.example .env   # compose requires the env_file to exist
          docker compose build \
            --build-arg INSTALL_CODEX=true \
            --build-arg INSTALL_CLAUDE_CODE=true \
            --build-arg INSTALL_AGENT2TELEGRAM=false \
            --build-arg INSTALL_HERMES=false \
            --build-arg INSTALL_OPENCLAW=false \
            --build-arg INSTALL_AGENTSMONITOR=false \
            --build-arg INSTALL_ANTIGRAVITY=false \
            --build-arg INSTALL_WHISPER=false

  smoke:
    name: Smoke test (boot, health, cron)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env
        working-directory: ./src
        run: cp .env.example .env

      - name: Build (core tools only)
        working-directory: ./src
        # Only the npm-installed tools; keep the image small and reliable.
        # AgentsMonitor is left out on purpose: CI must not go red because a
        # third-party repo is down. We test the contract the container offers
        # it - a working cron - rather than the tool itself.
        run: |
          docker compose build \
            --build-arg INSTALL_AGENT2TELEGRAM=false \
            --build-arg INSTALL_HERMES=false \
            --build-arg INSTALL_OPENCLAW=false \
            --build-arg INSTALL_AGENTSMONITOR=false \
            --build-arg INSTALL_ANTIGRAVITY=false \
            --build-arg INSTALL_WHISPER=false

      - name: Start
        working-directory: ./src
        run: docker compose up -d

      - name: Wait for healthy
        working-directory: ./src
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format '{{.State.Health.Status}}' evilagent 2>/dev/null || echo starting)
            echo "health: $status"
            [ "$status" = "healthy" ] && exit 0
            [ "$status" = "unhealthy" ] && break
            sleep 10
          done
          echo "container did not become healthy" >&2
          docker compose logs
          docker inspect --format '{{json .State.Health}}' evilagent || true
          exit 1

      - name: Tool inventory reflects INSTALL_* flags
        working-directory: ./src
        run: |
          out=$(docker compose exec -T -u agent evilagent /usr/local/bin/evilagent-health)
          echo "$out"
          echo "$out" | grep -q 'OK.*codex'    || { echo "codex should be installed" >&2; exit 1; }
          echo "$out" | grep -q 'OK.*claude'   || { echo "claude should be installed" >&2; exit 1; }
          # Tools excluded via --build-arg must show as disabled, never as missing.
          echo "$out" | grep -q 'hermes.*disabled'  || { echo "hermes should show as disabled" >&2; exit 1; }
          echo "$out" | grep -q 'whisper.*disabled' || { echo "whisper should show as disabled" >&2; exit 1; }

      - name: Agent can install a crontab despite no-new-privileges
        working-directory: ./src
        run: |
          # /usr/bin/crontab is setgid 'crontab' and no-new-privileges strips
          # setgid on exec; the agent is a real member of the group instead.
          # This is what `agentsmon service` depends on.
          docker compose exec -T -u agent evilagent bash -lc \
            'echo "* * * * * date >> /tmp/cron-proof.log" | crontab -'
          docker compose exec -T -u agent evilagent bash -lc 'crontab -l'

      - name: Cron actually executes the job
        working-directory: ./src
        run: |
          for i in $(seq 1 15); do
            if docker compose exec -T -u agent evilagent test -s /tmp/cron-proof.log; then
              echo "cron ran the job:"
              docker compose exec -T -u agent evilagent cat /tmp/cron-proof.log
              exit 0
            fi
            sleep 10
          done
          echo "cron never executed the job - 24/7 operation would silently not work" >&2
          docker compose exec -T -u root evilagent pgrep -ax cron || echo "cron not running"
          exit 1

      - name: Crontab survives a container recreate
        working-directory: ./src
        run: |
          # The spool is outside $HOME; without its volume a rebuild would
          # silently drop every cron job.
          docker compose down
          docker compose up -d
          sleep 15
          docker compose exec -T -u agent evilagent bash -lc 'crontab -l' | grep -q 'cron-proof' \
            || { echo "crontab was lost on recreate" >&2; exit 1; }
          echo "crontab survived"

      - name: Healthcheck fails when cron dies
        working-directory: ./src
        run: |
          docker compose exec -T -u root evilagent pkill -x cron
          if docker compose exec -T -u root evilagent /usr/local/bin/container-health; then
            echo "healthcheck stayed green with cron dead - nothing would restart agents" >&2
            exit 1
          fi
          echo "healthcheck correctly reported unhealthy"

      - name: Backup fails loudly rather than reporting a phantom success
        working-directory: ./src
        run: |
          ./scripts/backup.sh
          test -s backups/*/agent-data.tar.gz
          tar tzf backups/*/agent-data.tar.gz >/dev/null
          echo "backup produced a verifiable archive"

      - name: Teardown
        if: always()
        working-directory: ./src
        run: docker compose down -v
